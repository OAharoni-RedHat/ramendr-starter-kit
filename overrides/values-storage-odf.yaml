---
# ODF/Ceph storage overlay.
# Applied by `make install-odf`, which extracts each section and merges it into
# the corresponding values file before running the install.
#
# Sections:
#   hub        → merged into values-hub.yaml
#   resilient  → merged into values-resilient.yaml
#   egvDr      → merged into overrides/values-egv-dr.yaml
#   consolePluginsHub    → appended to overrides/values-console-plugins-hub.yaml
#   consolePluginsSpokes → appended to overrides/values-console-plugins-spokes.yaml
#
# To add a future storage provider (e.g. Dell), create overrides/values-storage-dell.yaml
# with the same structure and add an install-dell target to the Makefile.

hub:
  clusterGroup:
    namespaces:
      openshift-storage:

    # Append values-rdr-storage-odf.yaml to the rdr app so the chart uses the ODF
    # post-install automation path (MirrorPeer + prereqs jobs) rather than creating
    # DRCluster CRs directly, which requires manual S3 profile names.
    applications:
      rdr:
        extraValueFiles:
          - '$patternref/overrides/values-rdr-storage-odf.yaml'

    subscriptions:
      odf-multicluster-orchestrator:
        name: odf-multicluster-orchestrator
        namespace: openshift-operators

      openshift-data-foundation:
        name: odf-operator
        namespace: openshift-storage

    applications:
      opp-odf:
        name: opp-odf
        namespace: openshift
        project: opp
        path: charts/hub/opp-odf
        annotations:
          argocd.argoproj.io/sync-wave: "6"
        syncPolicy:
          automated: {}
          retry:
            limit: 20
            backoff:
              duration: 5s
              factor: 2
              maxDuration: 3m
          syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true
        extraValueFiles:
          - '/overrides/values-cluster-names.yaml'

      rdr-odf:
        name: rdr-odf
        namespace: regional-dr
        project: opp
        path: charts/hub/rdr-odf
        annotations:
          argocd.argoproj.io/sync-wave: "11"
        syncPolicy:
          automated: {}
          retry:
            limit: 60
            backoff:
              duration: 5s
              factor: 2
              maxDuration: 3m
          syncOptions:
            - RespectIgnoreDifferences=true
        extraValueFiles:
          - '/overrides/values-cluster-names.yaml'

      odf:
        name: odf
        namespace: openshift-storage
        project: opp
        chart: openshift-data-foundations
        chartVersion: 0.2.*
        syncOptions:
          - CreateNamespace=true
        extraValueFiles:
          - '$patternref/overrides/values-odf-chart.yaml'

# VM storage class for edge-gitops-vms — merged into overrides/values-egv-dr.yaml
egvDr:
  vmDefaults:
    storageClassName: "ocs-storagecluster-ceph-rbd-virtualization"

# Console plugins — appended to the base plugin lists
consolePluginsHub:
  ensureConsolePlugins:
    - odf-console
    - odf-multicluster-console

consolePluginsSpokes:
  ensureConsolePlugins:
    - odf-console

resilient:
  clusterGroup:
    namespaces:
      openshift-storage:
      openshift-adp:
        operatorGroup: true
        targetNamespaces:
          - openshift-adp

    subscriptions:
      openshift-data-foundation:
        name: odf-operator
        namespace: openshift-storage

      openshift-oadp:
        name: redhat-oadp-operator
        namespace: openshift-adp
        channel: stable

    applications:
      odf:
        name: odf
        namespace: openshift-storage
        project: resilient
        chart: openshift-data-foundations
        chartVersion: 0.2.*
        syncOptions:
          - CreateNamespace=true
        extraValueFiles:
          - '$patternref/overrides/values-odf-chart.yaml'

      adp-data-protection:
        name: adp-data-protection-application
        namespace: openshift-adp
        project: resilient
        repoURL: https://github.com/validatedpatterns/oadp-data-protection-application-chart.git
        chartVersion: main
        path: "."

    imperative:
      jobs:
        - name: clean-golden-images
          playbook: ansible/odf_fix_dataimportcrons.yml
          verbosity: -vvv
      clusterRoleYaml:
        - apiGroups:
            - "*"
          resources:
            - persistentvolumeclaims
            - datavolumes
            - dataimportcrons
            - datasources
          verbs:
            - "*"
        - apiGroups:
            - "*"
          resources:
            - "*"
          verbs:
            - get
            - list
            - watch
