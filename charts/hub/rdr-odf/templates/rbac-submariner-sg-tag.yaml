{{- if eq "1" (include "rdr-odf.submarinerSgTagJobEnabled" . | trim) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: submariner-sg-tagger
  namespace: open-cluster-management
  labels:
    app.kubernetes.io/name: submariner-sg-tag
    app.kubernetes.io/component: aws-tagging
  annotations:
    argocd.argoproj.io/sync-wave: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: submariner-sg-tagger
  labels:
    app.kubernetes.io/name: submariner-sg-tag
    app.kubernetes.io/component: aws-tagging
  annotations:
    argocd.argoproj.io/sync-wave: "8"
rules:
- apiGroups: ["hive.openshift.io"]
  resources: ["clusterdeployments"]
  verbs: ["get", "list"]
- apiGroups: ["cluster.open-cluster-management.io"]
  resources: ["managedclusters"]
  verbs: ["get", "list"]
- apiGroups: ["infrastructure.cluster.x-k8s.io"]
  resources: ["awsclusters"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: submariner-sg-tagger
  labels:
    app.kubernetes.io/name: submariner-sg-tag
    app.kubernetes.io/component: aws-tagging
  annotations:
    argocd.argoproj.io/sync-wave: "8"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: submariner-sg-tagger
subjects:
- kind: ServiceAccount
  name: submariner-sg-tagger
  namespace: open-cluster-management
{{- end }}
