---
apiVersion: v2
name: rdr-odf
description: ODF/Ceph-specific additions to the Regional DR setup.
  Includes Submariner cross-cluster networking, ODF MirrorPeer, DR prerequisites
  checker, and Ramen trusted-CA configuration. Deployed as a separate application
  after the base rdr chart so non-ODF storage providers (e.g. Dell) can be wired
  in without modifying the base Ramen chart.
  The ansible Jobs here mount the regionaldr-ansible ConfigMap created by the base
  rdr chart, which is guaranteed to be present at a lower sync wave.
version: 0.1.0
keywords:
  - odf
  - submariner
  - mirrorpeer
  - ramen
  - regional-dr
