---
# Hub context: wait until PRIMARY_CLUSTER and SECONDARY_CLUSTER report ManagedClusterConditionAvailable=True.
# Expects: primary_cluster, secondary_cluster, cluster_readiness_max_attempts, cluster_readiness_sleep.
- name: Wait until both DR ManagedClusters are Available on the hub
  kubernetes.core.k8s_info:
    api_version: cluster.open-cluster-management.io/v1
    kind: ManagedCluster
  register: mc_wait_ready
  until: >-
    (
      (
        (
          (
            mc_wait_ready.resources | default([])
            | selectattr('metadata.name', 'equalto', primary_cluster)
            | list
            | first
            | default({})
          ).status | default({})
        ).conditions | default([])
        | selectattr('type', 'equalto', 'ManagedClusterConditionAvailable')
        | map(attribute='status')
        | first
        | default('')
      ) == 'True'
    )
    and
    (
      (
        (
          (
            mc_wait_ready.resources | default([])
            | selectattr('metadata.name', 'equalto', secondary_cluster)
            | list
            | first
            | default({})
          ).status | default({})
        ).conditions | default([])
        | selectattr('type', 'equalto', 'ManagedClusterConditionAvailable')
        | map(attribute='status')
        | first
        | default('')
      ) == 'True'
    )
  retries: "{{ cluster_readiness_max_attempts | int }}"
  delay: "{{ cluster_readiness_sleep | int }}"

- name: Log ManagedCluster readiness (post-wait)
  ansible.builtin.debug:
    msg: "Both ManagedClusters Available: primary={{ primary_cluster }} secondary={{ secondary_cluster }}"
